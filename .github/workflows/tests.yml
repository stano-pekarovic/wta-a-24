name: Automated tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run test suite
        run: python -m unittest discover -s tests -v
